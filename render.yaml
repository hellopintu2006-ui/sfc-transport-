services:
  - type: web
    name: sfc-transport-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_EMAIL
        sync: false
